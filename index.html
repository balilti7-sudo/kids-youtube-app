<!doctype html>
<html lang="he" dir="rtl" translate="no">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        var key = 'safetube-theme'
        var stored = localStorage.getItem(key)
        var theme = stored === 'light' || stored === 'dark' ? stored : 'dark'
        if (theme === 'dark') document.documentElement.classList.add('dark')
        else document.documentElement.classList.remove('dark')
        var meta = document.querySelector('meta[name="theme-color"]')
        if (meta) meta.setAttribute('content', theme === 'dark' ? '#0f0f0f' : '#f8fafc')
      })()
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0f0f0f" />
    <meta name="google" content="notranslate" />
    <meta name="description" content="SafeTube — ניהול צפייה בטוחה ב-YouTube לילדים" />
    <meta property="og:title" content="SafeTube" />
    <meta property="og:description" content="ניהול צפייה בטוחה ב-YouTube לילדים" />
    <meta property="og:image" content="/og-image.png" />
    <title>SafeTube</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
