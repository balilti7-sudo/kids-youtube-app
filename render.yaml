services:
  - type: web
    name: safetube-media-bridge
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PORT
        value: 8787
      - key: CORS_ORIGIN
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: BUNNY_STREAM_API_KEY
        sync: false
      - key: BUNNY_LIBRARY_ID
        sync: false
      - key: BUNNY_CDN_HOSTNAME
        sync: false
      # Legacy (unused after Bunny migration):
      - key: SOCIALKIT_ACCESS_KEY
        sync: false
      - key: RAPIDAPI_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      # Required for forgot parent PIN + pairing reminder emails (/api/email/*)
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: MEDIA_BRIDGE_WELCOME_KEY
        sync: false
      - key: MEDIA_BRIDGE_GRANT_SECRET
        generateValue: true
