services:
  - type: web
    name: safetube-media-bridge
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install && npm run download-tools
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PORT
        value: 8787
      - key: CORS_ORIGIN
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: YOUTUBE_PO_TOKEN
        sync: false
      - key: YOUTUBE_VISITOR_DATA
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: MEDIA_BRIDGE_GRANT_SECRET
        generateValue: true
