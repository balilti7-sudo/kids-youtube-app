services:
  - type: web
    name: safetube-media-bridge
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install && npm run download-tools && chmod +x yt-dlp
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PORT
        value: 8787
      - key: USE_INGEST_WORKER
        value: "1"
      - key: USE_CLIENT_STREAM_RESOLVE
        value: "1"
      - key: CORS_ORIGIN
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: BUNNY_STREAM_API_KEY
        sync: false
      - key: BUNNY_LIBRARY_ID
        sync: false
      - key: BUNNY_CDN_HOSTNAME
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      # Required for forgot parent PIN + pairing reminder emails (/api/email/*)
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: MEDIA_BRIDGE_WELCOME_KEY
        sync: false
      - key: MEDIA_BRIDGE_GRANT_SECRET
        generateValue: true
  - type: worker
    name: safetube-ingest-worker
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install && npm run download-tools && chmod +x yt-dlp
    startCommand: npm run start:worker
    envVars:
      - key: NODE_VERSION
        value: 22
      # Worker is Bunny-free: it resolves direct googlevideo URLs via yt-dlp -g.
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: YT_DLP_PROXY_SCHEME
        sync: false
      - key: YT_DLP_PROXY_USER
        sync: false
      - key: YT_DLP_PROXY_PASSWORD
        sync: false
      - key: YT_DLP_PROXY_HOST
        sync: false
      - key: YT_DLP_PROXY_PORT
        sync: false
      - key: INGEST_WORKER_POLL_MS
        value: "2000"
      - key: INGEST_WORKER_CONCURRENCY
        value: "1"
      - key: INGEST_WORKER_JOB_DELAY_MIN_MS
        value: "15000"
      - key: INGEST_WORKER_JOB_DELAY_MAX_MS
        value: "45000"
      - key: INGEST_MAX_152_ATTEMPTS
        value: "3"
      - key: BRIDGE_KEEPALIVE_URL
        value: "https://safetube-media-bridge.onrender.com/health"
      - key: BRIDGE_KEEPALIVE_INTERVAL_MS
        value: "600000"
